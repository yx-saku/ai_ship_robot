/**:
  ros__parameters:
    # 基準TF生成は、LIO-SAM imageProjectionと同じフィルタ後の基準LiDAR topicを参照する。
    reference_custom_topic: /lidar1/livox/lidar_filtered

livox_custommsg_self_filter_node:
  ros__parameters:
    # Raw Livox CustomMsgを購読し、自己点群除去後のCustomMsgをSLAM入力へ渡す。
    input_topics:
      - /lidar1/livox/lidar
      - /lidar2/livox/lidar
    output_topics:
      - /lidar1/livox/lidar_filtered
      - /lidar2/livox/lidar_filtered
    filter_frame: base_footprint
    margin: 0.10
    tf_timeout_sec: 0.1
    drop_on_tf_failure: true
    # boxes.<name> は6値で1boxを表す: [x_min, x_max, y_min, y_max, z_min, z_max]
    boxes:
      # lidar_pattern_dual_opposit使用時の台車本体と支持ホイールをbase_footprint基準で外接する。
      robot_body: [-0.360, 0.360, -0.360, 0.360, 0.000, 0.330]

      # lidar_pattern_dual_oppositの上段Mid-360 collision box。
      lidar1: [0.428, 0.493, -0.033, 0.033, 0.145, 0.205]

      # lidar_pattern_dual_oppositの下段Mid-360 collision box。
      lidar2: [0.428, 0.493, -0.033, 0.033, 0.075, 0.135]

      # Gazeboモデルの固定アーム上物全体を簡易外接boxで除去する。
      welding_robot: [-0.310, 1.250, -0.310, 0.310, 0.330, 1.200]

lio_sam_imageProjection:
  ros__parameters:
    # 自己点群除去済みのCustomMsgをLIO-SAM内で直接同期し、中間fusion topicは生成しない。
    input_custom_topics:
      - /lidar1/livox/lidar_filtered
      - /lidar2/livox/lidar_filtered
    # 各LiDARをLIO-SAMのrange image上で別ring帯域に載せ、後続LiDARの遠方点欠落を防ぐ。
    input_ring_offsets:
      - 0
      - 4
    reference_custom_topic: /lidar1/livox/lidar_filtered
    max_stamp_delta_sec: 0.07
    tf_timeout_sec: 0.1
    timestamp_unit_scale: 1.0e-9
