/**:
  ros__parameters:
    # 基準TF生成は、LIO-SAM imageProjectionと同じ基準LiDAR topicを参照する。
    reference_custom_topic: /lidar1/livox/lidar

lio_sam_imageProjection:
  ros__parameters:
    # LIO-SAM内で各LiDARのCustomMsgを直接同期し、中間fusion topicは生成しない。
    input_custom_topics:
      - /lidar1/livox/lidar
      - /lidar2/livox/lidar
    # 各LiDARをLIO-SAMのrange image上で別ring帯域に載せ、後続LiDARの遠方点欠落を防ぐ。
    input_ring_offsets:
      - 0
      - 4
    reference_custom_topic: /lidar1/livox/lidar
    max_stamp_delta_sec: 0.07
    tf_timeout_sec: 0.1
    timestamp_unit_scale: 1.0e-9
